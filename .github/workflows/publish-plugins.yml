name: Publish Plugins to PyPI

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Discover packages
        id: discover
        run: |
          packages=$(find packages -mindepth 1 -maxdepth 1 -type d -name "evoid-*" | sort)
          echo "list<<EOF" >> "$GITHUB_OUTPUT"
          echo "$packages" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build all packages
        run: |
          for pkg in packages/evoid-*/; do
            echo "::group::Building $(basename $pkg)"
            uv build --out-dir dist/ "$pkg"
            echo "::endgroup::"
          done

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
