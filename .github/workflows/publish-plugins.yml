name: Publish Plugins to PyPI

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build all packages
        run: |
          for pkg in packages/evoid-*/; do
            echo "::group::Building $(basename $pkg)"
            uv build --out-dir dist/ "$pkg"
            echo "::endgroup::"
          done

      - name: Publish to PyPI
        run: |
          for whl in dist/*.whl; do
            echo "Publishing $(basename $whl)..."
            uv publish "$whl" --token "${{ secrets.PYPI_TOKEN }}" 2>&1 || true
            sleep 15
          done
