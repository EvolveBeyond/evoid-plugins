[project]
name = "evoid-maubot"
version = "0.2.0"
description = "EVOID adapter for maubot — bridge Matrix events to EVOID intents with Jitsi support"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [
    { name = "EvolveBeyond", email = "pakrohk@gmail.com" }
]
keywords = ["evoid", "maubot", "matrix", "iop", "jitsi", "sqlite"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Communications :: Chat",
]
dependencies = [
    "evoid>=0.4.0",
    "maubot>=0.1.0",
    "mautrix>=0.18.0",
]

[project.optional-dependencies]
storage = [
    "evoid-sqlite>=0.1.0",
    "evoid-smart-storage>=0.1.0",
    "evoid-di>=0.1.0",
]
full = [
    "evoid-maubot[storage]",
]
dev = [
    "pytest>=7.0.0",
    "ruff>=0.4.0",
]

[project.urls]
Homepage = "https://github.com/EvolveBeyond/evoid-plugins"
Documentation = "https://evolvebeyond.github.io/EVOID/"
Repository = "https://github.com/EvolveBeyond/evoid-plugins"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["evoid_maubot"]

[tool.ruff]
line-length = 120
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "W", "C90", "I", "N", "UP"]
ignore = ["E501", "N802", "C901"]
