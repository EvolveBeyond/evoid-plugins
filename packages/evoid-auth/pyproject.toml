[project]
name = "evoid-auth"
version = "0.1.1"
description = "Auth engine for EVOID — bring your own provider"
readme = "README.md"
keywords = ["evoid", "iop", "intent-oriented", "auth"]
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "evoid>=0.4.3",
]

[project.optional-dependencies]
jwt = ["pyjwt>=2.8.0"]
dev = ["pytest", "pytest-asyncio", "ruff"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["evoid_auth"]
force-include = { "README.md" = "README.md" }
