[project]
name = "evoid-auth"
version = "0.1.0"
description = "Auth engine for EVOID — bring your own provider"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "evoid>=0.4.0",
]

[project.optional-dependencies]
jwt = ["pyjwt>=2.8.0"]
dev = ["pytest", "pytest-asyncio", "ruff"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["evoid_auth"]
