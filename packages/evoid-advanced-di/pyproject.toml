[project]
name = "evoid-advanced-di"
version = "0.1.0"
description = "Advanced DI engine with context-aware routing for EVOID"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "evoid>=0.4.0",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "ruff"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["evoid_advanced_di"]
