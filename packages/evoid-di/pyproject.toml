[project]
name = "evoid-di"
version = "0.1.2"
description = "Dependency injection engine for EVOID — from simple to advanced"
readme = "README.md"
keywords = ["evoid", "iop", "intent-oriented", "di"]
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "evoid>=0.4.3",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "ruff"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["evoid_di"]
force-include = { "README.md" = "README.md" }
