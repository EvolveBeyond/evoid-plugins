[project]
name = "evoid-sqlite"
version = "0.1.1"
description = "SQLite storage engine for EVOID"
readme = "README.md"
keywords = ["evoid", "iop", "intent-oriented", "sqlite"]
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "evoid>=0.4.3",
    "aiosqlite>=0.20.0",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "ruff"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["evoid_sqlite"]
force-include = { "README.md" = "README.md" }
