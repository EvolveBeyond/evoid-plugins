[project]
name = "evoid-tasks"
version = "0.1.0"
description = "Background tasks with structured logging for EVOID"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "evoid>=0.4.0",
]

[project.optional-dependencies]
loguru = ["loguru>=0.7.0"]
dev = ["pytest", "pytest-asyncio", "ruff"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["evoid_tasks"]
