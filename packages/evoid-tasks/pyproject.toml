[project]
name = "evoid-tasks"
version = "0.1.1"
description = "Background tasks with structured logging for EVOID"
readme = "README.md"
keywords = ["evoid", "iop", "intent-oriented", "tasks"]
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "evoid>=0.4.3",
]

[project.optional-dependencies]
loguru = ["loguru>=0.7.0"]
dev = ["pytest", "pytest-asyncio", "ruff"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["evoid_tasks"]
force-include = { "README.md" = "README.md" }
