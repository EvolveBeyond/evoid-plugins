[package]
name = "evoid-transport"
version = "0.1.0"
edition = "2021"
description = "Low-latency UDP transport for EVOID — replaces WebSocket with ENet-level performance"
license = "MIT"

[lib]
name = "evoid_transport_rust"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.23", features = ["extension-module"] }
bincode = "1.3"
serde = { version = "1.0", features = ["derive"] }
parking_lot = "0.12"
bytes = "1.5"

[profile.release]
lto = true
codegen-units = 1
strip = true
