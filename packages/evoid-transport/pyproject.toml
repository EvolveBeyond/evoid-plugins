[project]
name = "evoid-transport"
version = "0.1.1"
description = "Low-latency UDP transport for EVOID — replaces WebSocket with ENet-level performance"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
authors = [
    { name = "EvolveBeyond", email = "pakrohk@gmail.com" }
]
keywords = ["evoid", "transport", "udp", "low-latency", "realtime", "godot"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
    "Topic :: Games/Entertainment",
]
dependencies = [
    "evoid>=0.4.3",
    "evoid-di>=0.1.0",
    "evoid-godot>=0.1.0",
]

[project.optional-dependencies]
rust = [
    "maturin>=1.0.0",
]
dev = [
    "pytest>=7.0.0",
    "ruff>=0.4.0",
]

[project.urls]
Homepage = "https://github.com/EvolveBeyond/evoid-plugins"
Documentation = "https://evolvebeyond.github.io/EVOID/"
Repository = "https://github.com/EvolveBeyond/evoid-plugins"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["evoid_transport"]

[tool.ruff]
line-length = 120
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "W", "C90", "I", "N", "UP"]
ignore = ["E501", "N802", "C901"]
