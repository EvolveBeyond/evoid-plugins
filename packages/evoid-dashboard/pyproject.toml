[project]
name = "evoid-dashboard"
version = "0.1.1"
description = "Monitoring dashboard for EVOID — service map, data lineage, DB viewer, logs"
readme = "README.md"
keywords = ["evoid", "iop", "intent-oriented", "dashboard"]
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "evoid>=0.4.3",
    "evoid-di>=0.1.0",
]

[project.optional-dependencies]
full = ["jinja2>=3.1.0", "uvicorn>=0.30.0"]
dev = ["pytest", "pytest-asyncio", "ruff"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["evoid_dashboard"]
force-include = { "README.md" = "README.md" }
