[project]
name = "evoid-godot"
version = "1.0.0"
description = "Godot game integration adapter for EVOID — connect Godot games to EVOID server"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
authors = [
    { name = "EvolveBeyond", email = "pakrohk@gmail.com" }
]
keywords = ["evoid", "godot", "game", "websocket", "adapter"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Games/Entertainment",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "evoid>=0.4.0",
]

[project.urls]
Homepage = "https://github.com/EvolveBeyond/evoid-plugins"
Documentation = "https://evolvebeyond.github.io/EVOID/"
Repository = "https://github.com/EvolveBeyond/evoid-plugins"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["evoid_godot"]

[tool.ruff]
line-length = 120
target-version = "py313"
