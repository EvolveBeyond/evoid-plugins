[project]
name = "evoid-smart-storage"
version = "0.1.1"
description = "Smart storage engine with data-type routing, multi-tenancy, and schema enforcement"
readme = "README.md"
keywords = ["evoid", "iop", "intent-oriented", "smart-storage"]
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "evoid>=0.4.3",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "ruff"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["evoid_smart_storage"]
force-include = { "README.md" = "README.md" }
