[project]
name = "evoid-scylla"
version = "0.1.1"
description = "ScyllaDB/Cassandra storage engine for EVOID"
readme = "README.md"
keywords = ["evoid", "iop", "intent-oriented", "scylla"]
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "evoid>=0.4.3",
    "evoid-di>=0.1.0",
    "cassandra-driver>=3.29.0",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "ruff"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["evoid_scylla"]
force-include = { "README.md" = "README.md" }
