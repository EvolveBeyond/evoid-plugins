[project]
name = "evoid-redis"
version = "0.1.0"
description = "Redis cache engine for EVOID"
readme = "README.md"
keywords = ["evoid", "iop", "intent-oriented", "redis"]
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "evoid>=0.4.0",
    "redis[hiredis]>=5.0.0",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "ruff"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["evoid_redis"]
force-include = { "README.md" = "README.md" }
